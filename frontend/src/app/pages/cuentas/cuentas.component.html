<h2>Cuentas</h2>

<div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>

<input [(ngModel)]="filtro" placeholder="Buscar cuentas" class="input" />

<div class="form">
  <div class="row">
    <label>Número Cuenta</label>
    <input class="input" [(ngModel)]="form.numeroCuenta" name="numeroCuenta" />
  </div>

  <div class="row">
    <label>Tipo</label>
    <select class="input" [(ngModel)]="form.tipoCuenta" name="tipoCuenta">
      <option [ngValue]="'AHORRO'">AHORRO</option>
      <option [ngValue]="'CORRIENTE'">CORRIENTE</option>
    </select>
  </div>

  <div class="row">
    <label>Saldo Inicial</label>
    <input class="input" type="number" [(ngModel)]="form.saldoInicial" name="saldoInicial" />
  </div>

  <div class="row">
    <label>Estado</label>
    <select class="input" [(ngModel)]="form.estado" name="estado">
      <option [ngValue]="true">Activo</option>
      <option [ngValue]="false">Inactivo</option>
    </select>
  </div>

  <!-- Buscar cliente -->
  <div class="row">
    <label>Buscar Cliente</label>
    <input
      class="input"
      [(ngModel)]="clienteFiltro"
      name="clienteFiltro"
      placeholder="Buscar por nombre / clienteId / identificación"
    />
  </div>

  <div class="row">
    <label>Cliente</label>
    <select class="input" [(ngModel)]="form.clienteId" name="clienteId">
      <option [ngValue]="''">-- Seleccione --</option>

      <option *ngFor="let c of clientesFiltrados()" [ngValue]="c.clienteId">
        {{ c.nombre }} ({{ c.clienteId }})
      </option>
    </select>

    <small *ngIf="form.clienteId" style="display:block;margin-top:6px;">
      Seleccionado: <b>{{ form.clienteId }}</b>
    </small>
  </div>

  <div class="actions">
    <button (click)="guardar()">{{ form.id ? 'Actualizar' : 'Guardar' }}</button>
    <button (click)="limpiar()">Limpiar</button>
  </div>
</div>

<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Número</th>
      <th>Tipo</th>
      <th>Saldo Inicial</th>
      <th>Estado</th>
      <th>Cliente</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let c of cuentasFiltradas()">
      <td>{{ c.id }}</td>
      <td>{{ c.numeroCuenta }}</td>
      <td>{{ c.tipoCuenta }}</td>
      <td>{{ c.saldoInicial }}</td>
      <td>{{ c.estado }}</td>
      <td>{{ nombreClientePorClienteId(c.clienteId) }}</td>
      <td>
        <button (click)="editar(c)">Editar</button>
        <button (click)="eliminar(c.id)">Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>
